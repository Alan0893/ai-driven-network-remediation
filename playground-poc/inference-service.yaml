apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    modelFormat: vLLM
    opendatahub.io/connections: granite-4-0-tiny
    opendatahub.io/hardware-profile-name: nvidia-a10-gpu
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/model-type: generative
    openshift.io/display-name: granite-4-0-tiny
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: Standard
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  name: granite-4-0-tiny
  namespace: playground-alan
spec:
  predictor:
    maxReplicas: 1
    minReplicas: 1
    model:
      args:
        - --enable-auto-tool-choice
        - --tool-call-parser=granite4
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
      runtime: granite-4-0-tiny
      storageUri: oci://registry.redhat.io/rhai/modelcar-granite-4-0-h-tiny:3.0
    tolerations:
      - effect: NoSchedule
        key: g5-gpu
        value: "true"
        operator: Equal

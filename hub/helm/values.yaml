# https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: quay.io/rh-ai-quickstart
  chatbotService: hub-chatbot-service
  ingestionPipeline: hub-ingestion-pipeline
  agentService: hub-agent-service
  frontend: noc-frontend
  pullPolicy: Always
  tag: "0.0.1"

global:
  routes:
    enabled: true

# ══════════════════════════════════════════════════════════════════════
# Remote subcharts
# ══════════════════════════════════════════════════════════════════════

pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

llama-stack:
  host: llamastack-service
  port: "8321"
  replicaCount: 1
  managedByOperator: true
  extraLabels:
    opendatahub.io/dashboard: "true"
  network:
    exposeRoute: false
  volumes:
    - configMap:
        defaultMode: 420
        name: run-config
      name: run-config-volume
    - name: dot-llama
      persistentVolumeClaim:
        claimName: llama-stack-data
    - emptyDir: {}
      name: cache
  volumeMounts:
    - mountPath: /app-config
      name: run-config-volume
    - mountPath: /.cache
      name: cache
  initContainers:
    enabled: true
  resources: {}
  pgvector:
    enabled: true
  mcp-servers:
    noc-openshift:
      uri: http://mcp-noc-openshift:8000/mcp
    noc-kafka:
      uri: http://mcp-noc-kafka:8000/mcp
    noc-aap:
      uri: http://mcp-noc-aap:8000/mcp
    noc-servicenow:
      uri: http://mcp-noc-servicenow:8000/mcp
  models:
    adnr-llm:
      id: ""
      enabled: false
      url: ""
      apiToken: ""
      maxTokens: 4096

# ══════════════════════════════════════════════════════════════════════
# Local infrastructure subcharts
# ══════════════════════════════════════════════════════════════════════

# ── Kafka (subchart: charts/kafka) ────────────────────────────────
# Defaults live in charts/kafka/values.yaml; only overrides are listed here.
kafka:
  enabled: true
  kafkaUI:
    enabled: false

# ── MinIO (subchart: charts/minio) ────────────────────────────────
# Defaults live in charts/minio/values.yaml; only overrides and parent references here.
minio:
  enabled: true
  route:
    enabled: true
  # Parent chart references (used by hub templates for ingestion-pipeline)
  host: minio
  port: "9000"
  secretName: minio

# ── LokiStack (subchart: charts/lokistack) ────────────────────────
lokistack:
  enabled: false
  name: logging-loki
  namespace: ""
  clusterDomain: ""
  minio:
    endpoint: "http://minio:9000"
    bucketName: loki
    region: us-east-1
    existingSecret:
      name: minio
      userKey: user
      passwordKey: password
    bucketJobImage:
      repository: quay.io/minio/minio
      tag: latest
      pullPolicy: IfNotPresent
  lokistack:
    name: logging-loki
    size: 1x.extra-small
    replication:
      factor: 1
    template:
      distributor:
        replicas: 1
      gateway:
        replicas: 1
      indexGateway:
        replicas: 1
      ingester:
        replicas: 1
      querier:
        replicas: 1
      queryFrontend:
        replicas: 1
    storage:
      secret:
        name: logging-loki-s3
        type: s3
      schemas:
        - version: v13
          effectiveDate: "2024-01-01"
      storageClassName: gp3-csi
    tenants:
      mode: openshift-logging
    limits:
      global:
        ingestion:
          ingestionRate: 50
          ingestionBurstSize: 50
        queries:
          queryTimeout: 3m
          maxVolumeSeries: 1000
  grafana:
    enabled: true
    replicas: 1
    image:
      repository: grafana/grafana
      tag: latest
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    auth:
      anonymous:
        enabled: false
        orgRole: Viewer
    datasources:
      loki:
        application:
          enabled: true
          name: Loki-Application
          isDefault: true
          tlsSkipVerify: true
        infrastructure:
          enabled: true
          name: Loki-Infrastructure
          isDefault: false
          tlsSkipVerify: true
        audit:
          enabled: false
          name: Loki-Audit
          isDefault: false
          tlsSkipVerify: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    service:
      type: ClusterIP
      port: 3000
      annotations:
        service.alpha.openshift.io/serving-cert-secret-name: grafana-tls
    route:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    rbac:
      serviceAccount:
        name: grafana
      lokiReader:
        serviceAccountName: grafana-loki-reader
  mcpLokistack:
    enabled: true
    rbac:
      serviceAccountName: mcp-lokistack-reader
  clusterLogForwarder:
    enabled: true
    name: instance
    namespace: openshift-logging
    serviceAccountName: logcollector
    tls:
      insecureSkipVerify: true
    pipelines:
      application: true
      infrastructure: true
      audit: false
  testLogGenerator:
    enabled: false
    replicas: 1
    image:
      repository: curlimages/curl
      tag: latest
    interval: 5

# ── LLM Service (subchart: llm-service) ──────────────────────────
# Deploys vLLM models on-cluster via KServe InferenceService + ServingRuntime.
# Disabled by default; enable when the cluster has GPU/CPU capacity for local
# model serving
#   make helm-install ENABLE_LLM_SERVICE=true
llm-service:
  enabled: false
  device: gpu
  secret:
    enabled: true
  models:
    granite-4-0-tiny:
      id: ibm-granite/granite-4.0-tiny-preview
      enabled: true
      labels:
        opendatahub.io/genai-asset: "true"
      resources:
        limits:
          cpu: "2"
          memory: 32Gi
        requests:
          cpu: "1"
          memory: 16Gi
      args:
        - --served-model-name
        - granite-4-0-tiny
        - --enable-auto-tool-choice
        - --chat-template
        - /chat-templates/tool_chat_template_llama3.2_json.jinja
        - --tool-call-parser
        - llama3_json
        - --max-model-len
        - "14336"
        - --max-num-seqs
        - "32"
        - --dtype
        - "bfloat16"

# ══════════════════════════════════════════════════════════════════════
# Mock services (deployed as Helm templates in hub/helm/templates/)
# ══════════════════════════════════════════════════════════════════════

aapMock:
  enabled: true
  image:
    repository: quay.io/rh-ai-quickstart/noc-aap-mock
    tag: "0.1.0"

servicenowMock:
  enabled: true
  apiKey: "demo-api-key-2026"
  image:
    repository: quay.io/rh-ai-quickstart/noc-servicenow-mock
    tag: "0.1.0"

# ══════════════════════════════════════════════════════════════════════
# Edge RBAC hook (pre-install Job)
# ══════════════════════════════════════════════════════════════════════

edgeRbac:
  enabled: false
  # Overridden at deploy time via: --set-string edgeRbac.edgeNamespace='$(EDGE_NAMESPACE)'
  edgeNamespace: "hub"
  edgeApiServer: "https://kubernetes.default.svc"
  image: "image-registry.openshift-image-registry.svc:5000/openshift/cli:latest"

# ══════════════════════════════════════════════════════════════════════
# Hub application services
# ══════════════════════════════════════════════════════════════════════

ingestionPipeline:
  replicaCount: 1
  autoIngestOnStartup: "true"
  waitForDeps: true
  vectorStoreName: noc_runbooks
  llamastackHost: llamastack-service
  embeddingModel: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
  chunkSizeTokens: 800
  chunkOverlapTokens: 80
  minio:
    bucket: runbooks
    secure: false
    runbookPrefix: runbooks/
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

chatbotService:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  env:
    mcpOpenshiftUrl: "http://mcp-noc-openshift:8000"
    mcpLokistackUrl: "http://mcp-noc-lokistack:8000"
    mcpKafkaUrl: "http://mcp-noc-kafka:8000"
    mcpAapUrl: "http://mcp-noc-aap:8000"
    mcpServicenowUrl: "http://mcp-noc-servicenow:8000"
    servicenowUrl: "http://servicenow-mock:8080"
    kafkaBootstrap: "kafka:9092"
    modelApiUrl: "http://llamastack-service:8321/v1/completions"
    modelName: "granite-4-h-tiny"
    demoTopic: "system-alerts"
    auditTopic: "incident-audit"
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

frontend:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  livenessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

agentService:
  replicaCount: 1
  granite:
    modelName: "granite-4.0-8b"
  lightspeed:
    url: ""
    token: ""
    tokenSecretName: ""
    tokenSecretKey: "api_key"
    verifySSL: "false"
    namespace: "aap"
    wrapperPlaybook: "playbooks/lightspeed-generate-and-run.yaml"
    baseTemplateName: "lightspeed-runner"
  slack:
    enabled: "false"
    botToken: ""
    existingSecret: ""
    channel: "#ai-driven-network"
  servicenowInstanceUrl: ""
  env:
    kafkaBootstrap: "kafka:9092"
    kafkaGroupId: "dark-noc-agent"
    kafkaAuditTopic: "incident-audit"
    kafkaConsumerEnabled: "true"
  service:
    type: ClusterIP
    port: 8001
    targetPort: 8001
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: 8001
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8001
    initialDelaySeconds: 10
    periodSeconds: 10

# ══════════════════════════════════════════════════════════════════════
# MCP Secrets
# ══════════════════════════════════════════════════════════════════════

mcpSecrets:
  openshift:
    # On OpenShift: keep false — the edge-rbac hook creates this secret dynamically.
    # On Kind/CI: set true and provide kubeconfig via --set-file mcpSecrets.openshift.kubeconfig=<path>
    create: false
    kubeconfig: ""
  aap:
    create: true
    username: ""
    password: ""
  servicenow:
    create: true
    apiKey: ""
    username: ""
    password: ""

# ══════════════════════════════════════════════════════════════════════
# MCP Servers (subchart: mcp-servers from ai-architecture-charts)
# ══════════════════════════════════════════════════════════════════════

mcp-servers:
  enabled: true
  mcp-servers:
    noc-openshift:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-openshift
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        DEFAULT_NAMESPACE: "dark-noc-edge"
        EDGE_KUBECONFIG: "/kubeconfig/kubeconfig"
      volumes:
        - name: edge-kubeconfig
          secret:
            secretName: noc-openshift-edge-kubeconfig
      volumeMounts:
        - name: edge-kubeconfig
          mountPath: /kubeconfig
          readOnly: true

    noc-lokistack:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-lokistack
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        LOKI_TLS_VERIFY: "false"
        LOKI_DEFAULT_TENANT: "application"
        LOKI_MAX_LINES: "100"
        LOKI_MAX_LINES_CEILING: "500"
        LOKI_MAX_DURATION: "24h"
        LOKI_QUERY_TIMEOUT: "30"
        LOKI_RETRY_ATTEMPTS: "3"
        LOKI_CA_CERT_PATH: ""
      envSecrets:
        LOKI_URL:
          name: lokistack-config
          key: LOKI_URL
        LOKI_TOKEN:
          name: mcp-lokistack-token
          key: token

    noc-kafka:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-kafka
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        KAFKA_CONSUME_TOPICS: "system-alerts,noc-alerts,remediation-jobs"
        KAFKA_PRODUCE_TOPICS: "remediation-jobs,agent-events,incident-audit"
        KAFKA_BOOTSTRAP: "kafka:9092"

    noc-aap:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-aap
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        AAP_URL: "https://aap.aap.svc"
        AAP_VERIFY_SSL: "true"
      envSecrets:
        AAP_USERNAME:
          name: noc-aap-secret
          key: AAP_USERNAME
        AAP_PASSWORD:
          name: noc-aap-secret
          key: AAP_PASSWORD

    noc-servicenow:
      enabled: true
      deploymentMode: deployment
      image:
        repository: quay.io/rh-ai-quickstart/noc-mcp-servicenow
        tag: "0.1.0"
      port: 8000
      targetPort: 8000
      transport: streamable-http
      imagePullPolicy: Always
      env:
        MCP_TRANSPORT: "streamable-http"
        MCP_PORT: "8000"
        SERVICENOW_URL: "http://servicenow-mock.hub.svc:8080"
        SERVICENOW_MODE: "auto"
      envSecrets:
        SERVICENOW_API_KEY:
          name: noc-servicenow-secret
          key: SERVICENOW_API_KEY
        SERVICENOW_USERNAME:
          name: noc-servicenow-secret
          key: SERVICENOW_USERNAME
        SERVICENOW_PASSWORD:
          name: noc-servicenow-secret
          key: SERVICENOW_PASSWORD

    # Disable default servers from the shared chart
    weather:
      enabled: false
    oracle-sqlcl:
      enabled: false
    github-mcp:
      enabled: false
    openshift-mcp:
      enabled: false
    slack-mcp:
      enabled: false

# ── Playground (subchart: playground) ─────────────────────────────
# Registers ADNR's MCP servers with the Gen AI Studio Playground UI
# via ConfigMaps in redhat-ods-applications.
# URLs use tpl-expanded templates so they resolve to the release namespace.
playground:
  enabled: true
  dashboardConfig:
    enabled: false
  genAiStudio: true
  aiAssetCustomEndpoints: true
  externalProviders: true
  externalVectorStores: true
  customEndpoints:
    enabled: true
    endpoints:
      - modelId: gemini-2.5-flash
        displayName: Gemini 2.5 Flash
        url: https://generativelanguage.googleapis.com/v1beta/openai/
        apiKey: ""
  vectorStores:
    enabled: true
    stores:
      - providerId: pgvector-provider
        providerType: remote::pgvector
        host: "pgvector.{{ .Release.Namespace }}.svc.cluster.local"
        port: 5432
        db: rag_blueprint
        user: postgres
        distanceMetric: COSINE
        credentialSecret:
          name: pgvector
          key: password
        vectorStoreId: vs-noc-runbooks-001
        displayName: "NOC Runbooks (pgvector)"
        embeddingModel: sentence-transformers/ibm-granite/granite-embedding-125m-english
        embeddingDimension: 768
        description: NOC runbook knowledge base for incident remediation
  mcpServers:
    servers:
      - name: MCP-OpenShift
        url: "http://mcp-noc-openshift.{{ .Release.Namespace }}.svc:8000/mcp/"
        description: OpenShift cluster operations
      - name: MCP-LokiStack
        url: "http://mcp-noc-lokistack.{{ .Release.Namespace }}.svc:8000/mcp/"
        description: LokiStack log queries
      - name: MCP-Kafka
        url: "http://mcp-noc-kafka.{{ .Release.Namespace }}.svc:8000/mcp/"
        description: Kafka messaging operations
      - name: MCP-AAP
        url: "http://mcp-noc-aap.{{ .Release.Namespace }}.svc:8000/mcp/"
        description: Ansible Automation Platform
      - name: MCP-ServiceNow
        url: "http://mcp-noc-servicenow.{{ .Release.Namespace }}.svc:8000/mcp/"
        description: ServiceNow incident management
      - name: MCP-Slack
        url: "http://mcp-noc-slack.{{ .Release.Namespace }}.svc:8000/mcp/"
        description: Slack notifications

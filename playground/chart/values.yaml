# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the fully qualified app name.
fullnameOverride: ""

# MCP Server Registration
mcpServers:
  # Enable creation of the gen-ai-aa-mcp-servers ConfigMap
  enabled: true
  # Namespace where the ConfigMap is created
  namespace: redhat-ods-applications
  # List of MCP servers to register
  servers:
    - name: MCP-OpenShift
      url: http://mcp-noc-openshift.{{ .Release.Namespace }}.svc:8000/mcp/
      description: OpenShift cluster operations — namespaces, pods, logs, events, deployments
    - name: MCP-LokiStack
      url: http://mcp-noc-lokistack.{{ .Release.Namespace }}.svc:8000/mcp/
      description: Log search, metrics, error pattern detection via LokiStack
    - name: MCP-Kafka
      url: http://mcp-noc-kafka.{{ .Release.Namespace }}.svc:8000/mcp/
      description: Kafka topic and message operations
    - name: MCP-AAP
      url: http://mcp-noc-aap.{{ .Release.Namespace }}.svc:8000/mcp/
      description: Ansible Automation Platform — job templates, launch, status
    - name: MCP-ServiceNow
      url: http://mcp-noc-servicenow.{{ .Release.Namespace }}.svc:8000/mcp/
      description: ServiceNow incident management
    - name: MCP-Slack
      url: http://mcp-noc-slack.{{ .Release.Namespace }}.svc:8000/mcp/
      description: Slack notifications and alerts

# Vector Store Registration
# Post-install Job that waits for LlamaStack, then ensures the vector store exists.
# The ingestion pipeline (hub chart) later populates it with runbook content.
vectorStore:
  enabled: true
  # Name of the vector store to create in LlamaStack
  name: noc_runbooks
  # LlamaStack URL (default: http://lsd-genai-playground-service.<namespace>.svc:8321)
  llamaStackUrl: ""
  # Embedding model ID (default: vllm-embedding/nomic-ai/nomic-embed-text-v1.5)
  embeddingModel: ""
  job:
    image: python:3.12-slim
    backoffLimit: 4
    activeDeadlineSeconds: 600
    waitTimeoutSeconds: 300
    pollIntervalSeconds: 10
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# LlamaStack Distribution CR
# Disabled by default — the Playground UI creates the LSD via a single click.
# Enable for fully headless/CI deploys where no UI interaction is desired.
llamaStack:
  enabled: false
  name: lsd-genai-playground
  replicas: 1
  modelName: granite-4-0-tiny
  embeddingModel: nomic-ai/nomic-embed-text-v1.5
  embeddingDimension: 768
  vllm:
    apiToken: fake
    tlsVerify: "false"
    maxTokens: 4096
  vllmEmbedding:
    url: ""
    apiToken: ""
    tlsVerify: ""
    maxTokens: "8192"
  embeddingProviderModelId: ""
  pgvector:
    host: pgvector
    port: 5432
    db: rag_blueprint
    user: postgres
    password: rag_password
  resources:
    limits:
      cpu: "2"
      memory: 12Gi
    requests:
      cpu: 250m
      memory: 500Mi
